<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Ross</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="card" id="main-card">
        <!-- Parte 1: El saludo inicial -->
        <div id="step-1">
            <h1>¡Buenos días peque! ✨</h1>
            <div class="image-container">
                <img src="Cinamorroll saludo.gif" alt="Cinnamoroll">
            </div>
            <button id="btn-next">Clicka aquí</button>
        </div>

        <!-- Parte 2: El resto del mensaje -->
        <div id="step-2" class="hidden">
            <h1>Para ti </h1>
            <div class="image-container">
                <img src="CinnaLove.jpg" alt="CinnaLove">
            </div>
            <p class="message">Espero que tengas un hermoso día sonsita ¡Eres especial! 🌸</p>
            <p class="love-message">¡Te quiero muchísimo!</p>
            <button id="btn-back" class="secondary-btn">Regresar</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
