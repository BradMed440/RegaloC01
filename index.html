<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Ross ✨</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="sunset-particles" id="particles-container"></div>

    <div class="container">
        <section id="step-1" class="glass-card active">
            <span class="label">Un mensaje especial</span>
            <h1 class="bold-text">¡Hola, sonsita!✨</h1>
            
            <div class="img-box">
                <img src="Cinnamorroll.jpg" alt="Cinnamoroll saludando">
            </div>
            
            <p class="text">Tengo algo muy importante que decirte antes de que empieces...</p>
            
            <button onclick="nextStep()" class="btn-sunset" aria-label="Ver el mensaje completo">
                <span>Ver mensaje ☁️</span>
            </button>
        </section>

        <section id="step-2" class="glass-card hidden">
            <span class="label">Con mucho cariño</span>
            <h1 class="bold-text">¡Mucha suerte!</h1>
            
            <div class="img-box spec-bg">
                <img src="CinnaLove.jpg" alt="Cinnamoroll deseando suerte">
            </div>
            
            <div class="message-content">
                <p class="text">¡Hoy en tu <strong>ensayo</strong> lo vas a hacer muy bien! 🍀</p>
                <p class="love-text">¡Te quiero mucho!</p>
            </div>
            
            <button onclick="prevStep()" class="btn-back" aria-label="Volver a la pantalla anterior">
                ← Volver
            </button>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
