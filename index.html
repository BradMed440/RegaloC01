<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Ross ✨</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="sunset-particles"></div>

    <main class="container">
        <div id="step-1" class="glass-card active">
            <span class="label">Para ti</span>
            <h1 class="bold-text">¡Hola, bonita!</h1>
            <div class="img-box">
                <img src="Cinamorroll saludo.gif" alt="Cinnamoroll Waka Waka">
            </div>
            <p class="text">Tengo un mensaje para ti...</p>
            <button onclick="nextStep()" class="btn-sunset">Ver mensaje ☁️</button>
        </div>

        <div id="step-2" class="glass-card hidden">
            <h1>Waka Wakaaa!</h1>
            <div class="img-box proportioned">
                <img src="CinnaLove.jpg" alt="Cinnamoroll Waka Waka">
            </div>
            <div class="message-content">
                <p class="text">¡Mucha suerte en tu ensayo de hoy peciosa! 🍀</p>
                <p class="text">Baila bonito como tú ya sabes✨</p>
                <p class="love-text">¡Mhuaaa!</p>
            </div>
            <button onclick="prevStep()" class="btn-back">← Volver</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
