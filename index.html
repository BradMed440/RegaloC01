<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ross • Un Deseo Estelar ☁️✨</title>
    <!-- Fuente premium: Quicksand para un look moderno y suave -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght=500;700;900&display=swap" rel="stylesheet">
    <!-- Vinculación de tu archivo estándar de estilos -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Fondo Cósmico Dinámico con Partículas -->
    <div id="particles-container" class="cosmic-dust"></div>

    <main class="viewport">
        <div class="container">
            
            <!-- PANTALLA 1: INVOCACIÓN ESTELAR -->
            <section id="pane-1" class="crystal-card active">
                <header class="card-header">
                    <span class="label">Para ti</span>
                    <h1 class="glow-text">¡Bueeeenas nochees!</h1>
                </header>
                
                <div class="hero-frame wave-border">
                    <img src="Cinamorroll saludo.gif" alt="Cinnamoroll te saluda">
                </div>
                
                <p class="body-text">Antes de empezar tu ensayo, quería decirte algo</p>
                
                <footer class="card-footer">
                    <button onclick="revealMessage()" class="btn-primary">
                        <span>Descubrir el mensaje</span>
                    </button>
                </footer>
            </section>

            <!-- PANTALLA 2: EL DESEO DE SUERTE -->
            <section id="pane-2" class="crystal-card hidden">
                <header class="card-header">
                    <span class="label">Con cariño, de parte de Mi y la Naleta</span>
                    <h1 class="glow-text">¡Suerte sonsita!</h1>
                </header>
                
                <div class="hero-frame spec-frame">
                    <img src="CinnaLove.jpg" alt="Cinnamoroll deseando suerte">
                </div>
                
                <div class="message-content">
                    <p class="body-text">Baila bonito. <strong>¡Brilla y brilla muy lindo!</strong></p>
                    <p class="love-text">¡Te quiero!</p>
                </div>
                
                <footer class="card-footer">
                    <button onclick="hideMessage()" class="btn-back">
                        ← Volver
                    </button>
                </footer>
            </section>
        </div>
    </main>

    <!-- Vinculación de tu archivo estándar de JavaScript -->
    <script src="script.js"></script>
</body>
</html>
